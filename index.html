<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>PageRank Simulator — 행렬로 재현하는 구글 검색</title>
<style>
  :root {
    --bg: #f4f5f8;
    --panel-bg: #ffffff;
    --text: #1a1d29;
    --muted: #6b7280;
    --border: #e2e4ea;
    --accent: #4f46e5;
    --accent-2: #06b6d4;
    --shadow: 0 1px 3px rgba(20, 20, 40, 0.08), 0 1px 2px rgba(20,20,40,0.04);
    --radius: 14px;
    --scale: 1;
  }
  :root[data-theme="dark"] {
    --bg: #14151f;
    --panel-bg: #1c1e2b;
    --text: #eef0f6;
    --muted: #8b8fa3;
    --border: #2c2f42;
    --shadow: 0 1px 3px rgba(0,0,0,0.4), 0 1px 2px rgba(0,0,0,0.3);
  }
  * { box-sizing: border-box; }
  html, body { height: 100%; }
  body {
    margin: 0;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, "Pretendard", "Apple SD Gothic Neo", "Segoe UI", sans-serif;
    font-size: calc(15px * var(--scale));
    display: flex;
    flex-direction: column;
    min-width: 1100px;
    transition: background 0.2s, color 0.2s;
  }
  header {
    padding: 14px 24px;
    display: flex;
    align-items: baseline;
    gap: 10px;
    border-bottom: 1px solid var(--border);
    background: var(--panel-bg);
  }
  header h1 {
    font-size: calc(1.25rem * var(--scale));
    margin: 0;
    background: linear-gradient(135deg, var(--accent), var(--accent-2));
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
    font-weight: 800;
    letter-spacing: -0.02em;
  }
  header p { margin: 0; color: var(--muted); font-size: calc(0.85rem * var(--scale)); }
  main {
    flex: 1;
    display: grid;
    grid-template-columns: 2fr 1fr;
    gap: 16px;
    padding: 16px 24px;
    min-height: 420px;
  }
  main > * { min-width: 0; }
  .panel {
    background: var(--panel-bg);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }
  .panel-title {
    padding: 10px 16px;
    font-weight: 600;
    font-size: calc(0.85rem * var(--scale));
    color: var(--muted);
    border-bottom: 1px solid var(--border);
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  #graphPanel canvas { display: block; width: 100%; height: 100%; cursor: grab; }
  .rightCol { display: flex; flex-direction: column; gap: 16px; min-height: 0; }
  #matrixPanel { flex: 0 0 auto; max-height: 46%; }
  #rankPanel { flex: 1; min-height: 0; }
  .matrix-body { overflow: auto; padding: 12px 16px; display: flex; justify-content: safe center; }
  table.matrix { border-collapse: collapse; font-variant-numeric: tabular-nums; font-size: calc(0.82rem * var(--scale)); }
  table.matrix th, table.matrix td {
    width: calc(46px * var(--scale)); height: calc(30px * var(--scale));
    text-align: center; border: 1px solid var(--border); transition: background 0.15s, opacity 0.15s;
  }
  table.matrix.compact { font-size: 0.6rem; }
  table.matrix.compact th, table.matrix.compact td {
    width: 24px; height: 17px; transition: none;
  }
  table.matrix th { color: var(--muted); font-weight: 500; background: var(--bg); }
  table.matrix td.highlight { background: var(--accent); color: #fff; font-weight: 700; }
  table.matrix td.dim { opacity: 0.3; }
  #rankList { list-style: none; margin: 0; padding: 10px; overflow: auto; flex: 1; }
  #rankList li {
    display: flex; align-items: center; gap: 10px;
    padding: 9px 10px; border-radius: 10px;
  }
  #rankList li:hover { background: var(--bg); }
  #rankList .pos { width: 1.6em; font-weight: 700; color: var(--muted); text-align: center; }
  #rankList .swatch { width: 12px; height: 12px; border-radius: 50%; flex: none; box-shadow: 0 0 0 3px color-mix(in srgb, currentColor 20%, transparent); }
  #rankList .name { flex: 1; font-weight: 500; }
  #rankList .value { font-variant-numeric: tabular-nums; color: var(--muted); font-size: calc(0.85rem * var(--scale)); }
  .controls {
    display: flex; align-items: center; gap: 12px; flex-wrap: wrap;
    padding: 12px 24px; border-top: 1px solid var(--border); background: var(--panel-bg);
    font-size: calc(0.88rem * var(--scale));
  }
  .controls button, .controls select {
    font: inherit; padding: 7px 14px; border-radius: 8px;
    border: 1px solid var(--border); background: var(--bg); color: var(--text); cursor: pointer;
    transition: filter 0.15s;
  }
  .controls button:hover, .controls select:hover { filter: brightness(0.96); }
  :root[data-theme="dark"] .controls button:hover, :root[data-theme="dark"] .controls select:hover { filter: brightness(1.2); }
  .controls button.primary { background: var(--accent); color: #fff; border-color: var(--accent); font-weight: 600; }
  .controls button.active { background: var(--accent-2); color: #fff; border-color: var(--accent-2); }
  .controls button:disabled { opacity: 0.4; cursor: not-allowed; }
  .controls .damping { display: flex; align-items: center; gap: 8px; color: var(--muted); }
  .controls .damping span { color: var(--text); font-variant-numeric: tabular-nums; min-width: 2.4em; }
  .controls .spacer { flex: 1; }
  #chartPanel { height: 340px; margin: 0 24px 16px; }
  #chartPanel canvas { width: 100%; height: 100%; display: block; }
  .badge {
    font-size: calc(0.78rem * var(--scale)); padding: 3px 9px; border-radius: 999px;
    background: var(--bg); color: var(--muted); border: 1px solid var(--border);
    font-variant-numeric: tabular-nums;
  }
</style>
</head>
<body>
  <header>
    <h1>PageRank Simulator</h1>
    <p>행렬로 재현하는 구글 검색의 핵심</p>
  </header>
  <main>
    <section id="graphPanel" class="panel">
      <div class="panel-title">
        <span>미니 인터넷</span>
        <span id="linkModeBadge" class="badge">이동 모드</span>
      </div>
      <canvas id="graphCanvas"></canvas>
    </section>
    <div class="rightCol">
      <section id="matrixPanel" class="panel">
        <div class="panel-title">
          <span id="matrixTitle">전이행렬 M</span>
          <button id="matrixToggle">인접행렬 보기</button>
        </div>
        <div class="matrix-body"><table class="matrix" id="matrixTable"></table></div>
      </section>
      <section id="rankPanel" class="panel">
        <div class="panel-title">
          <span>순위표</span>
          <span id="convergeBadge" class="badge">반복 0회</span>
        </div>
        <ol id="rankList"></ol>
      </section>
    </div>
  </main>
  <div class="controls">
    <select id="presetSelect">
      <option value="textbook">프리셋: PPT 예시 (A~F)</option>
      <option value="hub">프리셋: 허브 구조</option>
      <option value="spamFarm">프리셋: 스팸 팜</option>
      <option value="newsEcosystem">프리셋: 실제 사례 (웹 생태계, 노드 60개)</option>
    </select>
    <button id="addNodeBtn">노드 추가</button>
    <button id="removeNodeBtn">노드 삭제</button>
    <button id="linkModeBtn">링크 추가 모드</button>
    <button id="resetBtn">초기화</button>
    <span class="spacer"></span>
    <label class="damping">감쇠계수 d
      <input type="range" id="dampingSlider" min="0" max="1.0" step="0.01" value="0">
      <span id="dampingValue">0.00</span>
    </label>
    <button id="stepBtn">다음 단계</button>
    <button id="autoBtn" class="primary">계산 시작</button>
    <button id="presentBtn">발표 모드</button>
    <button id="darkBtn">다크 모드</button>
  </div>
  <section id="chartPanel" class="panel">
    <div class="panel-title"><span>수렴 그래프 (반복 횟수 vs 랭크 값)</span></div>
    <canvas id="chartCanvas"></canvas>
  </section>

  <script src="pagerank-core.js"></script>
  <script>
  'use strict';

  // === Elements ===
  const els = {
    graphCanvas: document.getElementById('graphCanvas'),
    matrixTable: document.getElementById('matrixTable'),
    matrixTitle: document.getElementById('matrixTitle'),
    matrixToggle: document.getElementById('matrixToggle'),
    rankList: document.getElementById('rankList'),
    convergeBadge: document.getElementById('convergeBadge'),
    presetSelect: document.getElementById('presetSelect'),
    addNodeBtn: document.getElementById('addNodeBtn'),
    removeNodeBtn: document.getElementById('removeNodeBtn'),
    linkModeBtn: document.getElementById('linkModeBtn'),
    linkModeBadge: document.getElementById('linkModeBadge'),
    resetBtn: document.getElementById('resetBtn'),
    dampingSlider: document.getElementById('dampingSlider'),
    dampingValue: document.getElementById('dampingValue'),
    stepBtn: document.getElementById('stepBtn'),
    autoBtn: document.getElementById('autoBtn'),
    presentBtn: document.getElementById('presentBtn'),
    darkBtn: document.getElementById('darkBtn'),
    chartCanvas: document.getElementById('chartCanvas'),
  };

  const NODE_POOL = ['네이버', '학교 홈페이지', '내 블로그', '유튜브', '위키백과', '인스타그램', '디시인사이드', '넷플릭스', '트위터', '카카오톡'];
  // Validated palettes (dataviz six-checks, light/dark surfaces). 7 hues in
  // fixed rank order + gray "Other" tail; dark mode gets its own gold step.
  const RANK_COLORS_LIGHT = ['#d19000', '#e04b4b', '#b45fd6', '#33a065', '#5b54e8', '#2f80ed', '#26a3c9', '#9b9fae', '#b3b7c4', '#c9ccd6'];
  const RANK_COLORS_DARK = ['#bd8300', '#e04b4b', '#b45fd6', '#33a065', '#5b54e8', '#2f80ed', '#26a3c9', '#8b8fa3', '#767b91', '#5f6478'];
  function rankColors() { return state.dark ? RANK_COLORS_DARK : RANK_COLORS_LIGHT; }

  // === State ===
  const state = {
    nodes: [],       // {id, name, x, y, r, displayR, color}
    links: [],       // {source, target}
    nodeCap: 10,     // max nodes allowed; presets can raise this (e.g. the 60-node scale demo)
    damping: 0,
    iteration: 0,
    rank: [],
    rankHistory: [], // [{iteration, values: {id: rank}}]
    converged: false,
    running: false,
    linkMode: false,
    pendingSource: null,
    selectedNode: null,
    highlighted: { type: null, a: null, b: null },
    matrixView: 'transition',
    presentation: false,
    dark: false,
  };

  // === Layout ===
  const SINGLE_RING_MAX = 14;

  function applyCircularLayout() {
    const cx = els.graphCanvas.clientWidth / 2;
    const cy = els.graphCanvas.clientHeight / 2;
    const n = state.nodes.length;

    if (n <= SINGLE_RING_MAX) {
      const radius = Math.min(cx, cy) * 0.72;
      state.nodes.forEach((node, i) => {
        const angle = (i / n) * Math.PI * 2 - Math.PI / 2;
        node.x = cx + radius * Math.cos(angle);
        node.y = cy + radius * Math.sin(angle);
      });
      return;
    }

    // Dense graphs: spread nodes across concentric rings instead of one
    // packed circle. Ring node-counts scale with ring radius so arc
    // spacing (and therefore node separation) stays roughly constant
    // across rings, instead of everything piling onto one circumference.
    const maxRadius = Math.min(cx, cy) * 0.9;
    const ringCount = Math.max(3, Math.ceil(Math.sqrt(n / 6)));
    const weights = Array.from({ length: ringCount }, (_, i) => i + 1);
    const totalWeight = weights.reduce((a, b) => a + b, 0);
    let idx = 0;
    for (let ring = 0; ring < ringCount; ring++) {
      const ringRadius = maxRadius * ((ring + 1) / ringCount);
      const isLast = ring === ringCount - 1;
      const count = isLast ? n - idx : Math.round(n * weights[ring] / totalWeight);
      for (let k = 0; k < count && idx < n; k++, idx++) {
        const angle = (k / count) * Math.PI * 2 - Math.PI / 2 + ring * 0.35;
        state.nodes[idx].x = cx + ringRadius * Math.cos(angle);
        state.nodes[idx].y = cy + ringRadius * Math.sin(angle);
      }
    }
  }

  // === Force simulation (d3-force style: repulsion + link springs + centering) ===
  // Runs inside the rAF loop; alpha decays toward rest, reheated on any graph change.
  let simAlpha = 0;
  function reheatSim(alpha) { simAlpha = Math.max(simAlpha, alpha); }

  function tickSim() {
    if (simAlpha < 0.005) return;
    simAlpha *= 0.972;
    const nodes = state.nodes;
    const n = nodes.length;
    if (n === 0) return;
    const w = els.graphCanvas.clientWidth, h = els.graphCanvas.clientHeight;
    const cx = w / 2, cy = h / 2;

    const sizeScale = Math.min(1, 12 / n);
    const charge = 2600 * sizeScale * sizeScale + 260;
    const linkDist = Math.max(55, 150 * sizeScale);

    for (const node of nodes) { node.vx = node.vx || 0; node.vy = node.vy || 0; }

    for (let i = 0; i < n; i++) {
      for (let j = i + 1; j < n; j++) {
        const a = nodes[i], b = nodes[j];
        let dx = b.x - a.x, dy = b.y - a.y;
        let d2 = dx * dx + dy * dy;
        if (d2 < 1) { dx = (Math.random() - 0.5); dy = (Math.random() - 0.5); d2 = 1; }
        const d = Math.sqrt(d2);
        const f = Math.min(6, (charge / d2) * simAlpha);
        const fx = (dx / d) * f, fy = (dy / d) * f;
        a.vx -= fx; a.vy -= fy;
        b.vx += fx; b.vy += fy;
      }
    }

    for (const link of state.links) {
      const a = state.nodes.find((nd) => nd.id === link.source);
      const b = state.nodes.find((nd) => nd.id === link.target);
      if (!a || !b) continue;
      const dx = b.x - a.x, dy = b.y - a.y;
      const d = Math.hypot(dx, dy) || 1;
      const f = (d - linkDist) * 0.045 * simAlpha;
      const fx = (dx / d) * f, fy = (dy / d) * f;
      a.vx += fx; a.vy += fy;
      b.vx -= fx; b.vy -= fy;
    }

    const pad = 30;
    for (const node of nodes) {
      if (node === dragNode) { node.vx = 0; node.vy = 0; continue; }
      node.vx += (cx - node.x) * 0.012 * simAlpha;
      node.vy += (cy - node.y) * 0.012 * simAlpha;
      node.vx *= 0.82;
      node.vy *= 0.82;
      node.x = Math.max(pad, Math.min(w - pad, node.x + node.vx));
      node.y = Math.max(pad, Math.min(h - pad, node.y + node.vy));
    }
  }

  function nextPoolName() {
    const used = new Set(state.nodes.map((n) => n.name));
    return NODE_POOL.find((name) => !used.has(name)) || `페이지${state.nodes.length + 1}`;
  }

  function resizeCanvas() {
    for (const canvas of [els.graphCanvas, els.chartCanvas]) {
      const rect = canvas.getBoundingClientRect();
      const dpr = window.devicePixelRatio || 1;
      canvas.width = Math.max(1, Math.round(rect.width * dpr));
      canvas.height = Math.max(1, Math.round(rect.height * dpr));
      canvas.getContext('2d').setTransform(dpr, 0, 0, dpr, 0, 0);
    }
  }
  window.addEventListener('resize', () => { resizeCanvas(); applyCircularLayout(); renderChart(); });

  function loadPreset(key) {
    const preset = PageRankCore.PRESETS[key];
    state.nodes = preset.nodes.map((n) => ({ ...n, r: 34, displayR: 34, color: '#999' }));
    state.links = preset.links.map((l) => ({ ...l }));
    state.nodeCap = Math.max(10, state.nodes.length);
    state.selectedNode = null;
    state.pendingSource = null;
    resizeCanvas();
    applyCircularLayout();
    reheatSim(1);
    resetComputation();
  }

  // === Graph renderer ===
  function sortedByRank() {
    return [...state.nodes].sort((a, b) => rankOf(b.id) - rankOf(a.id));
  }
  function rankOf(id) {
    const i = state.nodes.findIndex((n) => n.id === id);
    return state.rank[i] ?? 0;
  }

  function updateNodeVisuals() {
    const order = sortedByRank();
    const values = state.rank.length ? state.rank : state.nodes.map(() => 1 / state.nodes.length);
    const min = Math.min(...values), max = Math.max(...values);
    // Dense graphs need much smaller nodes or they just overlap into a
    // solid blob; shrink the whole size range as node count grows.
    const sizeScale = Math.min(1, 12 / state.nodes.length);
    const minR = 24 * sizeScale, maxR = 64 * sizeScale;
    state.nodes.forEach((node) => {
      const v = rankOf(node.id);
      const t = max > min ? (v - min) / (max - min) : 0.5;
      node.r = minR + t * (maxR - minR);
      node.displayR = node.displayR ?? node.r;
      // Top ranks get distinct hues; everything past the palette folds into
      // the gray tail instead of cycling (cycling would repaint rank 11 as rank 1).
      const colors = rankColors();
      node.rankIndex = order.findIndex((n) => n.id === node.id);
      node.color = colors[Math.min(node.rankIndex, colors.length - 1)];
    });
  }

  function drawArrow(ctx, x1, y1, r1, x2, y2, r2, color, dimmed) {
    const angle = Math.atan2(y2 - y1, x2 - x1);
    const startX = x1 + Math.cos(angle) * r1;
    const startY = y1 + Math.sin(angle) * r1;
    const endX = x2 - Math.cos(angle) * (r2 + 4);
    const endY = y2 - Math.sin(angle) * (r2 + 4);
    ctx.strokeStyle = color;
    ctx.globalAlpha = dimmed ? 0.15 : 0.7;
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(startX, startY);
    ctx.lineTo(endX, endY);
    ctx.stroke();
    const headLen = Math.min(9, r2 * 0.8);
    ctx.beginPath();
    ctx.moveTo(endX, endY);
    ctx.lineTo(endX - headLen * Math.cos(angle - Math.PI / 6), endY - headLen * Math.sin(angle - Math.PI / 6));
    ctx.lineTo(endX - headLen * Math.cos(angle + Math.PI / 6), endY - headLen * Math.sin(angle + Math.PI / 6));
    ctx.closePath();
    ctx.fillStyle = color;
    ctx.globalAlpha = dimmed ? 0.15 : 0.9;
    ctx.fill();
    ctx.globalAlpha = 1;
  }

  function renderGraph() {
    tickSim();
    const ctx = els.graphCanvas.getContext('2d');
    const w = els.graphCanvas.clientWidth, h = els.graphCanvas.clientHeight;
    ctx.clearRect(0, 0, w, h);
    const styles = getComputedStyle(document.documentElement);
    const edgeColor = styles.getPropertyValue('--muted').trim();
    const surface = styles.getPropertyValue('--panel-bg').trim();
    const ink = styles.getPropertyValue('--text').trim();
    const dense = state.nodes.length > SINGLE_RING_MAX;

    for (const link of state.links) {
      const a = state.nodes.find((n) => n.id === link.source);
      const b = state.nodes.find((n) => n.id === link.target);
      if (!a || !b) continue;
      const isHi = state.highlighted.type === 'link' && state.highlighted.a === link.source && state.highlighted.b === link.target;
      const anyHi = state.highlighted.type !== null;
      drawArrow(ctx, a.x, a.y, a.displayR, b.x, b.y, b.displayR, isHi ? '#4f46e5' : edgeColor, anyHi && !isHi);
    }

    for (const node of state.nodes) {
      node.displayR += ((node.r ?? 34) - node.displayR) * 0.15;
      const isHi = state.highlighted.type === 'node' && state.highlighted.a === node.id;
      const isSelected = state.selectedNode === node.id;
      const isPending = state.pendingSource === node.id;
      const anyHi = state.highlighted.type !== null;
      const emphasized = isHi || isSelected || isPending;

      ctx.globalAlpha = anyHi && !isHi ? 0.3 : 1;
      ctx.beginPath();
      ctx.arc(node.x, node.y, node.displayR, 0, Math.PI * 2);
      ctx.fillStyle = node.color;
      if (emphasized) {
        ctx.shadowColor = node.color;
        ctx.shadowBlur = 18;
      }
      ctx.fill();
      ctx.shadowBlur = 0;
      // 2px surface ring separates overlapping marks (dataviz spacer rule)
      ctx.lineWidth = 2;
      ctx.strokeStyle = surface;
      ctx.stroke();
      if (isPending || isSelected) {
        ctx.lineWidth = 2.5;
        ctx.strokeStyle = isPending ? '#06b6d4' : node.color;
        ctx.beginPath();
        ctx.arc(node.x, node.y, node.displayR + 4, 0, Math.PI * 2);
        ctx.stroke();
      }
      ctx.globalAlpha = 1;

      // Labels: small graphs label inside every node; dense graphs label only
      // the top ranks (and any hovered/selected node) beneath the dot in ink.
      if (!dense && node.displayR >= 11) {
        ctx.fillStyle = '#fff';
        ctx.font = `600 ${Math.min(13, node.displayR * 0.34)}px -apple-system, sans-serif`;
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText(node.name, node.x, node.y);
      } else if (dense && (emphasized || node.rankIndex < 5)) {
        ctx.globalAlpha = anyHi && !isHi ? 0.3 : 1;
        ctx.fillStyle = ink;
        ctx.font = `600 11px -apple-system, sans-serif`;
        ctx.textAlign = 'center';
        ctx.textBaseline = 'top';
        ctx.fillText(node.name, node.x, node.y + node.displayR + 3);
        ctx.globalAlpha = 1;
      }
    }
    requestAnimationFrame(renderGraph);
  }

  // === Node/link interaction ===
  function nodeAt(x, y) {
    for (let i = state.nodes.length - 1; i >= 0; i--) {
      const n = state.nodes[i];
      if (Math.hypot(n.x - x, n.y - y) <= n.displayR) return n;
    }
    return null;
  }

  function distToSegment(px, py, x1, y1, x2, y2) {
    const dx = x2 - x1, dy = y2 - y1;
    const lenSq = dx * dx + dy * dy;
    let t = lenSq === 0 ? 0 : ((px - x1) * dx + (py - y1) * dy) / lenSq;
    t = Math.max(0, Math.min(1, t));
    const cx = x1 + t * dx, cy = y1 + t * dy;
    return Math.hypot(px - cx, py - cy);
  }

  function linkAt(x, y) {
    const THRESH = 8;
    for (const link of state.links) {
      const a = state.nodes.find((n) => n.id === link.source);
      const b = state.nodes.find((n) => n.id === link.target);
      if (!a || !b) continue;
      if (distToSegment(x, y, a.x, a.y, b.x, b.y) <= THRESH) return link;
    }
    return null;
  }

  function canvasPoint(evt) {
    const rect = els.graphCanvas.getBoundingClientRect();
    return { x: evt.clientX - rect.left, y: evt.clientY - rect.top };
  }

  let dragNode = null;
  let dragMoved = false;

  els.graphCanvas.addEventListener('mousedown', (evt) => {
    const { x, y } = canvasPoint(evt);
    const node = nodeAt(x, y);
    if (node) { dragNode = node; dragMoved = false; }
  });

  let lastHighlightKey = '::';
  function setHighlighted(type, a, b) {
    const key = `${type}:${a}:${b}`;
    if (key === lastHighlightKey) return;
    lastHighlightKey = key;
    state.highlighted = { type, a, b };
    renderMatrix();
  }

  els.graphCanvas.addEventListener('mousemove', (evt) => {
    const { x, y } = canvasPoint(evt);
    if (dragNode) {
      dragNode.x = x;
      dragNode.y = y;
      dragMoved = true;
      reheatSim(0.25);
      return;
    }
    const node = nodeAt(x, y);
    const link = node ? null : linkAt(x, y);
    if (node) setHighlighted('node', node.id, null);
    else if (link) setHighlighted('link', link.source, link.target);
    else setHighlighted(null, null, null);
    els.graphCanvas.style.cursor = node || link ? 'pointer' : 'grab';
  });

  window.addEventListener('mouseup', () => {
    if (dragNode && !dragMoved) handleNodeClick(dragNode);
    dragNode = null;
  });

  els.graphCanvas.addEventListener('click', (evt) => {
    if (dragMoved) return;
    const { x, y } = canvasPoint(evt);
    const node = nodeAt(x, y);
    if (node) return; // handled via mouseup -> handleNodeClick
    const link = linkAt(x, y);
    if (link) {
      state.links = state.links.filter((l) => l !== link);
      reheatSim(0.6);
      recomputeAfterGraphChange();
      return;
    }
    state.selectedNode = null;
  });

  function handleNodeClick(node) {
    if (state.linkMode) {
      if (!state.pendingSource) {
        state.pendingSource = node.id;
      } else if (state.pendingSource === node.id) {
        state.pendingSource = null;
      } else {
        const exists = state.links.some((l) => l.source === state.pendingSource && l.target === node.id);
        if (!exists) state.links.push({ source: state.pendingSource, target: node.id });
        state.pendingSource = null;
        reheatSim(0.6);
        recomputeAfterGraphChange();
      }
    } else {
      state.selectedNode = state.selectedNode === node.id ? null : node.id;
    }
  }

  // === Link mode + node count controls ===
  els.linkModeBtn.addEventListener('click', () => {
    state.linkMode = !state.linkMode;
    state.pendingSource = null;
    els.linkModeBtn.classList.toggle('active', state.linkMode);
    els.linkModeBtn.textContent = state.linkMode ? '링크 추가 모드 (끄기)' : '링크 추가 모드';
    els.linkModeBadge.textContent = state.linkMode ? '링크 추가 모드: 노드 A → B 클릭' : '이동 모드';
  });

  els.addNodeBtn.addEventListener('click', () => {
    if (state.nodes.length >= state.nodeCap) return;
    const id = `n${Date.now()}`;
    state.nodes.push({ id, name: nextPoolName(), r: 34, displayR: 34, color: '#999' });
    applyCircularLayout();
    reheatSim(1);
    recomputeAfterGraphChange();
    syncNodeButtons();
  });

  els.removeNodeBtn.addEventListener('click', () => {
    if (state.nodes.length <= 3) return;
    const targetId = state.selectedNode || state.nodes[state.nodes.length - 1].id;
    state.nodes = state.nodes.filter((n) => n.id !== targetId);
    state.links = state.links.filter((l) => l.source !== targetId && l.target !== targetId);
    state.selectedNode = null;
    applyCircularLayout();
    reheatSim(1);
    recomputeAfterGraphChange();
    syncNodeButtons();
  });

  function syncNodeButtons() {
    els.addNodeBtn.disabled = state.nodes.length >= state.nodeCap;
    els.removeNodeBtn.disabled = state.nodes.length <= 3;
  }

  // === Matrix panel ===
  function fmt(v) {
    if (v === 0) return '0';
    const denom = Math.round(1 / v);
    return Math.abs(v - 1 / denom) < 1e-9 && denom > 1 ? `1/${denom}` : v.toFixed(2);
  }

  function isCellHighlighted(rowIdx, colIdx) {
    const h = state.highlighted;
    if (h.type === 'node') return state.nodes[rowIdx]?.id === h.a || state.nodes[colIdx]?.id === h.a;
    if (h.type === 'link') return state.nodes[colIdx]?.id === h.a && state.nodes[rowIdx]?.id === h.b;
    return false;
  }

  function renderMatrix() {
    const matrix = state.matrixView === 'adjacency'
      ? PageRankCore.buildAdjacency(state.nodes, state.links)
      : PageRankCore.buildTransition(state.nodes, state.links);
    els.matrixTitle.textContent = state.matrixView === 'adjacency' ? '인접행렬 A' : '전이행렬 M';
    els.matrixToggle.textContent = state.matrixView === 'adjacency' ? '전이행렬 보기' : '인접행렬 보기';

    const n = state.nodes.length;
    const dense = n > SINGLE_RING_MAX;
    els.matrixTable.classList.toggle('compact', dense);
    // Dense graphs: 2-char name prefixes are all identical (사이, 사이, ...);
    // number headers stay unique and fit the compact cells.
    const headerOf = (node, i) => dense ? String(i + 1) : node.name.slice(0, 2);
    let html = '<tr><th></th>' + state.nodes.map((node, i) => `<th title="${node.name}">${headerOf(node, i)}</th>`).join('') + '</tr>';
    for (let i = 0; i < n; i++) {
      html += `<tr><th title="${state.nodes[i].name}">${headerOf(state.nodes[i], i)}</th>`;
      for (let j = 0; j < n; j++) {
        const isHi = isCellHighlighted(i, j);
        const dim = state.highlighted.type !== null && !isHi;
        html += `<td data-row="${i}" data-col="${j}" class="${isHi ? 'highlight' : ''} ${dim ? 'dim' : ''}">${fmt(matrix[i][j])}</td>`;
      }
      html += '</tr>';
    }
    els.matrixTable.innerHTML = html;
  }

  els.matrixToggle.addEventListener('click', () => {
    state.matrixView = state.matrixView === 'adjacency' ? 'transition' : 'adjacency';
    renderMatrix();
  });

  els.matrixTable.addEventListener('mouseover', (evt) => {
    const cell = evt.target.closest('td[data-row]');
    if (!cell) return;
    const row = Number(cell.dataset.row), col = Number(cell.dataset.col);
    const targetNode = state.nodes[row], sourceNode = state.nodes[col];
    if (!targetNode || !sourceNode) return;
    setHighlighted('link', sourceNode.id, targetNode.id);
  });
  els.matrixTable.addEventListener('mouseleave', () => {
    setHighlighted(null, null, null);
  });

  // === PageRank engine ===
  function snapshotRanks() {
    const out = {};
    state.nodes.forEach((node, i) => { out[node.id] = state.rank[i]; });
    return out;
  }

  function updateConvergeBadge() {
    els.convergeBadge.textContent = state.converged
      ? `반복 ${state.iteration}회 (수렴)`
      : `반복 ${state.iteration}회`;
  }

  function resetComputation() {
    state.iteration = 0;
    state.converged = false;
    state.rank = PageRankCore.initRankVector(state.nodes.length);
    state.rankHistory = [{ iteration: 0, values: snapshotRanks() }];
    state.running = false;
    els.autoBtn.textContent = '계산 시작';
    updateNodeVisuals();
    updateConvergeBadge();
    renderMatrix();
    renderRankListAnimated();
    renderChart();
  }

  function stepOnce() {
    const matrix = PageRankCore.buildTransition(state.nodes, state.links);
    const next = PageRankCore.stepPageRank(matrix, state.rank, state.damping);
    const delta = PageRankCore.maxDelta(state.rank, next);
    state.rank = next;
    state.iteration += 1;
    state.rankHistory.push({ iteration: state.iteration, values: snapshotRanks() });
    state.converged = PageRankCore.isConverged(delta, state.iteration);
    updateNodeVisuals();
    updateConvergeBadge();
    renderMatrix();
    renderRankListAnimated();
    renderChart();
    if (state.converged) stopAuto();
  }

  function recomputeAfterGraphChange() {
    resetComputation();
  }

  let autoTimer = null;
  function startAuto() {
    if (state.nodes.length === 0) return;
    state.running = true;
    els.autoBtn.textContent = '일시정지';
    els.autoBtn.classList.add('active');
    autoTimer = setInterval(() => {
      stepOnce();
      if (state.converged) stopAuto();
    }, 400);
  }
  function stopAuto() {
    state.running = false;
    els.autoBtn.textContent = '계산 시작';
    els.autoBtn.classList.remove('active');
    clearInterval(autoTimer);
    autoTimer = null;
  }

  els.stepBtn.addEventListener('click', () => { stopAuto(); stepOnce(); });
  els.autoBtn.addEventListener('click', () => { state.running ? stopAuto() : startAuto(); });
  els.dampingSlider.addEventListener('input', () => {
    state.damping = Number(els.dampingSlider.value);
    els.dampingValue.textContent = state.damping.toFixed(2);
    stopAuto();
    resetComputation();
  });

  // === Rank table (animated) ===
  function renderRankListAnimated() {
    const prevRects = new Map();
    els.rankList.querySelectorAll('li[data-id]').forEach((li) => {
      prevRects.set(li.dataset.id, li.getBoundingClientRect().top);
    });
    const order = sortedByRank();
    els.rankList.innerHTML = order.map((node, i) => `
      <li data-id="${node.id}">
        <span class="pos">${i + 1}</span>
        <span class="swatch" style="background:${node.color};color:${node.color}"></span>
        <span class="name">${node.name}</span>
        <span class="value">${rankOf(node.id).toFixed(4)}</span>
      </li>
    `).join('');
    els.rankList.querySelectorAll('li[data-id]').forEach((li) => {
      const prevTop = prevRects.get(li.dataset.id);
      if (prevTop === undefined) return;
      const newTop = li.getBoundingClientRect().top;
      const delta = prevTop - newTop;
      if (delta === 0) return;
      li.style.transform = `translateY(${delta}px)`;
      li.style.transition = 'none';
      requestAnimationFrame(() => {
        li.style.transition = 'transform 0.35s ease';
        li.style.transform = 'translateY(0)';
      });
    });
  }

  // === Convergence chart ===
  function renderChart() {
    const ctx = els.chartCanvas.getContext('2d');
    const w = els.chartCanvas.clientWidth, h = els.chartCanvas.clientHeight;
    const pad = { l: 46, r: 16, t: 16, b: 26 };
    ctx.clearRect(0, 0, w, h);
    const history = state.rankHistory;
    if (history.length < 2) return;

    const muted = getComputedStyle(document.documentElement).getPropertyValue('--muted').trim();
    const border = getComputedStyle(document.documentElement).getPropertyValue('--border').trim();

    const maxIter = history[history.length - 1].iteration;
    const allValues = history.flatMap((point) => Object.values(point.values));
    const maxVal = Math.max(0.01, ...allValues) * 1.08;

    const xOf = (iter) => pad.l + (iter / Math.max(1, maxIter)) * (w - pad.l - pad.r);
    const yOf = (val) => h - pad.b - (val / maxVal) * (h - pad.t - pad.b);

    // horizontal gridlines + y-axis value labels
    ctx.strokeStyle = border;
    ctx.fillStyle = muted;
    ctx.font = '11px sans-serif';
    ctx.textAlign = 'right';
    ctx.textBaseline = 'middle';
    const GRID_STEPS = 4;
    for (let i = 0; i <= GRID_STEPS; i++) {
      const val = (maxVal / GRID_STEPS) * i;
      const y = yOf(val);
      ctx.globalAlpha = i === 0 ? 1 : 0.5;
      ctx.beginPath();
      ctx.moveTo(pad.l, y);
      ctx.lineTo(w - pad.r, y);
      ctx.stroke();
      ctx.globalAlpha = 1;
      ctx.fillText(val.toFixed(3), pad.l - 8, y);
    }

    const order = sortedByRank();
    const dense = state.nodes.length > SINGLE_RING_MAX;
    const pointRadius = history.length <= 30 && !dense ? 3 : 0;
    const colors = rankColors();
    // Dense graphs: color only the top-7 ranked series; the long tail draws
    // first in recessive gray so leaders stay readable on top.
    const drawOrder = [...state.nodes].sort((a, b) =>
      (order.findIndex((n) => n.id === b.id)) - (order.findIndex((n) => n.id === a.id)));
    drawOrder.forEach((node) => {
      const colorIdx = order.findIndex((n) => n.id === node.id);
      const isTail = dense && colorIdx >= 7;
      const color = isTail ? border : colors[Math.min(colorIdx, colors.length - 1)];
      ctx.strokeStyle = color;
      ctx.globalAlpha = isTail ? 0.5 : 1;
      ctx.lineWidth = isTail ? 1 : 2;
      ctx.beginPath();
      history.forEach((point, i) => {
        const x = xOf(point.iteration), y = yOf(point.values[node.id] ?? 0);
        i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
      });
      ctx.stroke();
      ctx.globalAlpha = 1;
      if (pointRadius > 0) {
        ctx.fillStyle = color;
        history.forEach((point) => {
          const x = xOf(point.iteration), y = yOf(point.values[node.id] ?? 0);
          ctx.beginPath();
          ctx.arc(x, y, pointRadius, 0, Math.PI * 2);
          ctx.fill();
        });
      }
    });

    ctx.fillStyle = muted;
    ctx.font = '11px sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'alphabetic';
    ctx.fillText(`반복 횟수 (0-${maxIter})`, (pad.l + w - pad.r) / 2, h - 6);
  }

  // === Presets + reset ===
  els.presetSelect.addEventListener('change', () => {
    stopAuto();
    loadPreset(els.presetSelect.value);
    syncNodeButtons();
  });

  els.resetBtn.addEventListener('click', () => {
    stopAuto();
    els.presetSelect.value = 'textbook';
    loadPreset('textbook');
    syncNodeButtons();
  });

  // === Presentation mode ===
  els.presentBtn.addEventListener('click', () => {
    state.presentation = !state.presentation;
    document.documentElement.style.setProperty('--scale', state.presentation ? '1.35' : '1');
    els.presentBtn.classList.toggle('active', state.presentation);
    els.presentBtn.textContent = state.presentation ? '발표 모드 (끄기)' : '발표 모드';
  });

  els.darkBtn.addEventListener('click', () => {
    state.dark = !state.dark;
    document.documentElement.setAttribute('data-theme', state.dark ? 'dark' : 'light');
    els.darkBtn.classList.toggle('active', state.dark);
    els.darkBtn.textContent = state.dark ? '라이트 모드' : '다크 모드';
    // Palette is mode-specific; recolor nodes, rank list, and chart.
    updateNodeVisuals();
    renderRankListAnimated();
    renderChart();
  });

  window.addEventListener('keydown', (evt) => {
    const tag = document.activeElement.tagName;
    if (tag === 'INPUT' || tag === 'SELECT' || tag === 'TEXTAREA') return;
    if (evt.code === 'Space') { evt.preventDefault(); stopAuto(); stepOnce(); }
    else if (evt.key === 'r' || evt.key === 'R') { els.resetBtn.click(); }
    else if (evt.key === 'a' || evt.key === 'A') { state.running ? stopAuto() : startAuto(); }
  });

  // === Bootstrap ===
  resizeCanvas();
  loadPreset('textbook');
  syncNodeButtons();
  requestAnimationFrame(renderGraph);
  </script>
</body>
</html>
